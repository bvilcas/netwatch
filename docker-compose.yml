services:
  postgres:
    image: postgres:16
    container_name: netwatch-postgres
    environment:
      POSTGRES_DB: netwatch
      POSTGRES_USER: netwatch
      POSTGRES_PASSWORD: netwatch
    ports:
      - "5432:5432"
    volumes:
      - netwatch-pgdata:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/schema.sql

volumes:
  netwatch-pgdata:
